kind = "web"
previewPath = "/"
title = "The Stroke Comeback Protocol"
version = "1.0.0"
id = "artifacts/stroke-comeback"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25422

[services.development]
run = "pnpm --filter @workspace/stroke-comeback run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stroke-comeback", "run", "build" ]
publicDir = "artifacts/stroke-comeback/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25422"
BASE_PATH = "/"
